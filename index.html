<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Huginn — Security Intelligence Platform</title>
  <style>
    :root { --bg: #0f1117; --text: #e2e4e9; --text2: #9ca3af; --accent: #6366f1; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .center { text-align: center; padding: 2rem; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: var(--text2); font-size: 1rem; margin-bottom: 1.5rem; }
    a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="center">
    <h1>Huginn</h1>
    <p>Security Intelligence Platform</p>
    <a href="/scanner">Scanner Information &amp; Opt-Out</a>
  </div>
</body>
</html>
